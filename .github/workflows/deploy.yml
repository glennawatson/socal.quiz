name: Deploy Discord Quiz Bot

on:
  push:
    branches:
      - main

permissions:
  id-token: write
  contents: read

env:
  AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
  AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
  AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
  RESOURCE_GROUP: discordQuizBotRG
  LOCATION: westus  # Specify your preferred location
  DISCORD_BOT_TOKEN: ${{ secrets.DISCORD_BOT_TOKEN }}
  NODE_VERSION: '22.x'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install backend dependencies
        run: |
          npm install
          npm install --include=optional sharp

      - name: Run tests with coverage
        run: npx vitest --coverage

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v6
        with:
          token: ${{ secrets.CODECOV_TOKEN }}

      - name: Build backend
        run: npm run build

      - name: Install web client dependencies
        working-directory: web_client
        run: npm install

      - name: Build web client
        working-directory: web_client
        env:
          VITE_DISCORD_CLIENT_ID: ${{ secrets.DISCORD_CLIENT_ID }}
          VITE_DISCORD_REDIRECT_URI: ${{ secrets.WEB_CLIENT_REDIRECT_URI }}
          VITE_API_BASE_URL: ''
        run: npm run build

      - name: Upload backend build artifacts
        uses: actions/upload-artifact@v7
        with:
          name: backend-build
          path: |
            dist/**
            lib/**

      - name: Upload web client build artifacts
        uses: actions/upload-artifact@v7
        with:
          name: webclient-build
          path: web_client/dist/**

  deploy:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Download backend build artifacts
        uses: actions/download-artifact@v8
        with:
          name: backend-build
          path: ./dist

      - name: Download web client build artifacts
        uses: actions/download-artifact@v8
        with:
          name: webclient-build
          path: ./webclient-dist

      - name: Set up Bicep
        run: |
          az bicep install
          az bicep upgrade

      - name: Azure login
        uses: azure/login@v3
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Create Resource Group
        run: |
          az group create --name $RESOURCE_GROUP --location $LOCATION

      - name: Deploy Bicep template
        run: |
          az deployment group create \
            --resource-group $RESOURCE_GROUP \
            --template-file main.bicep \
            --parameters discordBotToken=$DISCORD_BOT_TOKEN

      - name: Deploy Function App code
        run: |
          az functionapp deployment source config-zip \
            --name ${functionAppName} \
            --resource-group $RESOURCE_GROUP \
            --src ./dist/deployment.zip

      - name: Get Static Web App deployment token
        id: swa-token
        run: |
          TOKEN=$(az staticwebapp secrets list \
            --name discordquizbotwebclient \
            --resource-group $RESOURCE_GROUP \
            --query "properties.apiKey" -o tsv)
          echo "::add-mask::$TOKEN"
          echo "token=$TOKEN" >> "$GITHUB_OUTPUT"

      - name: Deploy web client to Azure Static Web Apps
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ steps.swa-token.outputs.token }}
          action: upload
          app_location: ./webclient-dist
          skip_app_build: true
          skip_api_build: true
